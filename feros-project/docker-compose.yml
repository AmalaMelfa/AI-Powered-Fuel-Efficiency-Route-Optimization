version: '3.8'

services:
  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - feros-network

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - feros-network

  # ML Service (Optional)
  ml-service:
    build:
      context: ./ml-model
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    volumes:
      - ./ml-model:/app
    networks:
      - feros-network

networks:
  feros-network:
    driver: bridge
